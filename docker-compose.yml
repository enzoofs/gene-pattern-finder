services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rainman
      POSTGRES_PASSWORD: rainman_dev
      POSTGRES_DB: rainman
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rainman"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://rainman:rainman_dev@db:5432/rainman"
      DATABASE_URL_SYNC: "postgresql+psycopg2://rainman:rainman_dev@db:5432/rainman"
      REDIS_URL: "redis://redis:6379/0"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    working_dir: /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://rainman:rainman_dev@db:5432/rainman"
      DATABASE_URL_SYNC: "postgresql+psycopg2://rainman:rainman_dev@db:5432/rainman"
      REDIS_URL: "redis://redis:6379/0"
    command: celery -A app.worker.celery_app worker --loglevel=info --pool=solo
    volumes:
      - ./backend:/app
    working_dir: /app

volumes:
  pgdata:
